services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=hermes_db
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:root@db:5432/hermes_db
      - REDIS_URL=redis://redis:6379
      - VOLUME_MOUNT_PATH=/data
      - HERMES_PLATFORM_URL
      - HERMES_AUTH_APP_ID
      - HERMES_AUTH_SECRET
      - HERMES_STORAGE_APP_ID
      - HERMES_STORAGE_SECRET_KEY
      - HERMES_APP_TOKEN
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - backend-data:/data
    depends_on:
      - db
      - redis

  frontend:
    build: frontend
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

volumes:
  db-data:
  backend-data:
